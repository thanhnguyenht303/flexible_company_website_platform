services:
  postgres:
    image: postgres:16-alpine
    container_name: company_site_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: company_site_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      IMAGE_STORAGE_ROOT: /app/Images
      FILE_STORAGE_ROOT: /app/files_storage
    depends_on:
      - postgres
    volumes:
      - ./public/uploads:/app/public/uploads
      - ../Images:/app/Images
      - ../files_storage:/app/files_storage
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:alpine
    container_name: company_site_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
