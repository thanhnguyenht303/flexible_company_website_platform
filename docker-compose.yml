services:
  postgres:
    image: postgres:16-alpine
    container_name: company_site_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-company_website}
      POSTGRES_USER: ${DATABASE_USER:-company_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: company_site_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./public/uploads:/app/public/uploads
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: company_site_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
